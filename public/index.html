<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Builds — pake</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="/app.css" />
</head>
<body>
<header class="topbar">
  <div class="inner">
    <a class="brand" href="/">pake<span>.</span></a>
    <nav class="nav">
      <a href="/" aria-current="page">Builds</a>
      <a href="/new">New app</a>
    </nav>
  </div>
</header>

<main class="wrap">
  <div class="head">
    <h1>Builds</h1>
    <p>Every app you've packaged, with its installers. Builds are kept for the retention window set on the server.</p>
  </div>

  <div class="toolbar">
    <div class="search">
      <svg width="15" height="15" viewBox="0 0 16 16" fill="none" aria-hidden="true">
        <circle cx="7" cy="7" r="4.5" stroke="currentColor" stroke-width="1.5"/>
        <path d="M10.5 10.5L14 14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
      <label class="sr-only" for="q">Search builds by app name or website</label>
      <input id="q" type="search" placeholder="Search by app name or website" autocomplete="off" />
    </div>
    <button class="btn" id="check" type="button" disabled>Check now</button>
    <div class="seg" role="group" aria-label="Filter by status">
      <button type="button" data-f="all" aria-pressed="true">All</button>
      <button type="button" data-f="active" aria-pressed="false">Building</button>
      <button type="button" data-f="done" aria-pressed="false">Ready</button>
      <button type="button" data-f="error" aria-pressed="false">Failed</button>
    </div>
  </div>

  <p class="count" id="count"></p>
  <p class="sr-only" id="say" aria-live="polite"></p>
  <div id="list"></div>
</main>

<script>
const OS_ORDER = ['linux', 'windows', 'macos'];
const TERMINAL = ['done', 'error'];
const WORD = {
  queued:'Queued', dispatching:'Dispatching', locating:'Finding run',
  running:'Building', collecting:'Collecting installers', done:'Ready', error:'Failed',
};

const list = document.getElementById('list');
const countEl = document.getElementById('count');
const say = document.getElementById('say');
const qInput = document.getElementById('q');
const segButtons = [...document.querySelectorAll('.seg button')];

const cards = new Map();
const announced = new Set();
let jobs = [];
let filter = 'all';

const el = (tag, cls, text) => {
  const n = document.createElement(tag);
  if (cls) n.className = cls;
  if (text != null) n.textContent = text;
  return n;
};
const setText = (n, t) => { if (n.textContent !== t) n.textContent = t; };
const setAttr = (n, k, v) => { if (n.getAttribute(k) !== v) n.setAttribute(k, v); };

const fileSize = (b) =>
  b >= 1048576 ? (b / 1048576).toFixed(1) + ' MB' : Math.max(1, Math.round(b / 1024)) + ' KB';

function ago(ms) {
  const s = Math.round((Date.now() - ms) / 1000);
  if (s < 60) return s + 's ago';
  if (s < 3600) return Math.floor(s / 60) + 'm ago';
  if (s < 86400) return Math.floor(s / 3600) + 'h ago';
  return Math.floor(s / 86400) + 'd ago';
}

const host = (url) => { try { return new URL(url).host; } catch { return url; } };

/* A platform that compiled but has no files yet is still being downloaded from
   GitHub. Saying "Built" there reads as finished while nothing is clickable. */
function legState(leg, hasFiles, jobStatus) {
  if (!leg) return 'queued';
  if (leg.conclusion && leg.conclusion !== 'success') return 'failed';
  if (leg.status === 'completed' && !hasFiles && !TERMINAL.includes(jobStatus)) return 'fetching';
  return leg.status;
}

function legWord(leg, jobStatus, hasFiles) {
  if (!leg) return TERMINAL.includes(jobStatus) ? 'Not run' : 'Waiting';
  if (leg.conclusion && leg.conclusion !== 'success') {
    return leg.conclusion === 'cancelled' ? 'Cancelled' : 'Failed';
  }
  if (leg.status === 'completed') {
    return hasFiles || TERMINAL.includes(jobStatus) ? 'Built' : 'Fetching installers\u2026';
  }
  if (leg.status === 'in_progress') return 'Building';
  return 'Queued';
}

/* Cards are built once and mutated on later polls, so scroll position,
   text selection and an open log stay put while a build progresses. */
function makeCard(job) {
  const root = el('article', 'card');

  const top = el('div', 'card-top');
  const name = el('h2', 'card-name', job.input.name);
  const pill = el('span', 'pill');
  top.append(name, pill);

  const meta = el('p', 'card-meta');
  const metaText = document.createTextNode('');
  const runLink = el('a');
  runLink.target = '_blank';
  runLink.rel = 'noopener';
  meta.append(metaText, runLink);

  const rows = el('div');
  const rowMap = new Map();
  for (const os of OS_ORDER) {
    if (!job.input.platforms.includes(os)) continue;
    const row = el('div', 'plat-row');
    const state = el('div', 'plat-state');
    const word = el('span');
    state.append(el('span', 'dot'), word);
    const files = el('div', 'files');
    row.append(el('div', 'plat-os', os), state, files);
    rows.append(row);
    rowMap.set(os, { row, word, files });
  }

  const log = el('details', 'log');
  const pre = el('pre');
  log.append(el('summary', null, 'Build log'), pre);

  const note = el('p', 'card-note');
  note.hidden = true;

  // Two-step delete rather than a browser confirm(): the button becomes its own
  // confirmation and disarms itself, so nothing blocks the page.
  const actions = el('div', 'card-actions');
  const del = el('button', 'btn-quiet danger', 'Delete');
  del.type = 'button';
  del.setAttribute('aria-label', 'Delete build ' + job.input.name);
  let armed = false;
  let disarm;
  const reset = () => {
    armed = false;
    del.textContent = 'Delete';
    del.classList.remove('arming');
  };
  del.addEventListener('click', async () => {
    if (!armed) {
      armed = true;
      del.textContent = 'Confirm delete';
      del.classList.add('arming');
      disarm = setTimeout(reset, 4000);
      return;
    }
    clearTimeout(disarm);
    del.disabled = true;
    del.textContent = 'Deleting…';
    await fetch('/api/builds/' + job.id, { method: 'DELETE' }).catch(() => {});
    await refresh();
  });
  actions.append(del);

  root.append(top, meta, rows, log, note, actions);
  return { root, logLines: 0, n: { name, pill, metaText, runLink, rowMap, pre, note } };
}

function paint(card, job) {
  const n = card.n;
  setText(n.name, job.input.name);
  setText(n.pill, WORD[job.status] ?? job.status);
  setAttr(n.pill, 'data-s', job.status);
  n.metaText.nodeValue = host(job.input.url) + ' \u00b7 ' + ago(job.createdAt) + ' \u00b7 ';

  if (job.runUrl) {
    n.runLink.hidden = false;
    n.runLink.href = job.runUrl;
    setText(n.runLink, 'run ' + (job.runId ?? ''));
  } else {
    n.runLink.hidden = true;
    setText(n.runLink, '');
  }

  const legs = new Map((job.legs || []).map((l) => [l.os, l]));
  const filesByOs = new Map();
  for (const a of job.artifacts || []) {
    if (!filesByOs.has(a.os)) filesByOs.set(a.os, []);
    filesByOs.get(a.os).push(a);
  }

  for (const [os, row] of n.rowMap) {
    const leg = legs.get(os);
    const files = filesByOs.get(os) || [];
    setAttr(row.row, 'data-s', legState(leg, files.length > 0, job.status));
    setText(row.word, legWord(leg, job.status, files.length > 0));

    if (row.files.childElementCount !== files.length) {
      row.files.replaceChildren(
        ...files.map((f) => {
          const a = el('a', 'file');
          a.href = '/api/builds/' + job.id + '/file/' + encodeURI(f.file);
          a.setAttribute('aria-label', 'Download ' + f.name + ', ' + fileSize(f.size));
          a.title = f.name;
          a.append(document.createTextNode(f.name), el('span', 'kb', fileSize(f.size)));
          return a;
        }),
      );
    }
  }

  if (job.error) {
    n.note.hidden = false;
    n.note.className = 'card-note bad';
    setText(n.note, job.error);
  } else if (job.warning) {
    n.note.hidden = false;
    n.note.className = 'card-note warn';
    setText(n.note, job.warning);
  } else {
    n.note.hidden = true;
  }
}

function matches(job) {
  const q = qInput.value.trim().toLowerCase();
  if (q && !(job.input.name.toLowerCase().includes(q) || job.input.url.toLowerCase().includes(q))) {
    return false;
  }
  if (filter === 'active') return !TERMINAL.includes(job.status);
  if (filter === 'done') return job.status === 'done';
  if (filter === 'error') return job.status === 'error';
  return true;
}

function emptyState() {
  const q = qInput.value.trim();
  const box = el('div', 'empty');
  if (!jobs.length) {
    box.append(
      el('h2', null, 'No builds yet'),
      el('p', null, 'Package a website and its installers will show up here.'),
    );
    const go = el('a', 'btn btn-primary', 'New app');
    go.href = '/new';
    box.append(go);
  } else {
    box.append(
      el('h2', null, 'Nothing matches'),
      el('p', null, q
        ? 'No build matches \u201c' + q + '\u201d with the current filter.'
        : 'No build has that status yet.'),
    );
    const clear = el('button', 'btn btn-sm', 'Clear filters');
    clear.type = 'button';
    clear.addEventListener('click', () => { qInput.value = ''; setFilter('all'); });
    box.append(clear);
  }
  return box;
}

function render() {
  const shown = jobs.filter(matches);

  countEl.textContent = jobs.length
    ? shown.length + ' of ' + jobs.length + ' build' + (jobs.length === 1 ? '' : 's')
    : '';

  for (const [id, card] of cards) {
    if (!jobs.some((j) => j.id === id)) {
      card.root.remove();
      cards.delete(id);
    }
  }

  if (!shown.length) {
    for (const card of cards.values()) card.root.remove();
    if (!list.querySelector('.empty')) list.replaceChildren(emptyState());
    return;
  }
  const stale = list.querySelector('.empty');
  if (stale) stale.remove();

  // Filtered-out cards leave the DOM but keep their state for when they return.
  for (const [id, card] of cards) {
    if (!shown.some((j) => j.id === id) && card.root.parentNode) card.root.remove();
  }

  let prev = null;
  for (const job of shown) {
    let card = cards.get(job.id);
    if (!card) {
      card = makeCard(job);
      cards.set(job.id, card);
    }
    paint(card, job);
    const expected = prev ? prev.nextElementSibling : list.firstElementChild;
    if (expected !== card.root) {
      if (prev) prev.after(card.root);
      else list.prepend(card.root);
    }
    prev = card.root;
  }
}

async function refresh() {
  try {
    ({ jobs } = await (await fetch('/api/builds')).json());
  } catch {
    return; // next tick retries
  }
  render();

  for (const job of jobs.filter(matches)) {
    const card = cards.get(job.id);
    if (!card) continue;
    const detail = await fetch('/api/builds/' + job.id + '?after=' + card.logLines)
      .then((r) => r.json())
      .catch(() => null);
    if (!detail) continue;

    if (detail.log && detail.log.length) {
      const pre = card.n.pre;
      const pinned = pre.scrollHeight - pre.scrollTop - pre.clientHeight < 24;
      pre.textContent += detail.log.join('\n') + '\n';
      if (pinned) pre.scrollTop = pre.scrollHeight;
    }
    card.logLines = detail.logCount;

    if (TERMINAL.includes(job.status) && !announced.has(job.id)) {
      announced.add(job.id);
      say.textContent =
        job.status === 'done'
          ? job.input.name + ' is ready, ' + (job.artifacts || []).length + ' installers to download.'
          : job.input.name + ' failed to build.';
    }
  }
}

const checkBtn = document.getElementById('check');
let pollTimer = null;

const anyActive = () => jobs.some((j) => !TERMINAL.includes(j.status));

/* Poll quickly while something is building, then back right off. Nothing
   changes on its own once every build has finished. */
function schedule() {
  if (pollTimer) clearTimeout(pollTimer);
  pollTimer = setTimeout(tick, anyActive() ? 5000 : 60000);
}
async function tick() {
  await refresh();
  checkBtn.disabled = !anyActive();
  schedule();
}

checkBtn.addEventListener('click', async () => {
  checkBtn.disabled = true;
  const was = checkBtn.textContent;
  checkBtn.textContent = 'Checking…';
  // Wakes the server's GitHub poll too, so this is a real check, not a re-read.
  await fetch('/api/check', { method: 'POST' }).catch(() => {});
  await refresh();
  checkBtn.textContent = was;
  checkBtn.disabled = !anyActive();
  schedule();
});

function setFilter(next) {
  filter = next;
  for (const b of segButtons) b.setAttribute('aria-pressed', String(b.dataset.f === next));
  render();
}

qInput.addEventListener('input', render);
for (const b of segButtons) b.addEventListener('click', () => setFilter(b.dataset.f));

tick();
</script>
</body>
</html>
