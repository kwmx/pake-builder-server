# Pake Cloud Builder — works locally and as a Coolify "Docker Compose" resource.
#
# COOLIFY DEPLOY (see README for the click-path):
#   Resource type : Docker Compose (Git-based)
#   Base Directory: /server   <- if this file lives in a subfolder of your repo
#   Env vars      : set GITHUB_OWNER / GITHUB_REPO / GITHUB_TOKEN in the UI
#
# The ${VAR} syntax below is deliberate: Coolify surfaces those as editable
# fields in its Environment Variables tab. Hardcoded values would not appear.

services:
  # Single-word service name: Coolify's magic variables cannot combine an
  # underscore in the identifier with a port suffix.
  pake:
    build:
      context: .
      dockerfile: Dockerfile

    environment:
      # Coolify generates the domain and Traefik route from this. Leave it
      # valueless; override the domain in Coolify's UI to use your own.
      - SERVICE_FQDN_PAKE_3000

      # ---- required (set these in Coolify > Environment Variables) ----
      - GITHUB_OWNER=${GITHUB_OWNER}
      - GITHUB_REPO=${GITHUB_REPO}
      - GITHUB_TOKEN=${GITHUB_TOKEN}

      # ---- optional, with sane defaults ----
      - WORKFLOW_FILE=${WORKFLOW_FILE:-build.yml}
      - GIT_REF=${GIT_REF:-main}
      # Each build buffers its artifact zips in memory while unpacking, so raise
      # this only if the host has the RAM for that many at once.
      - MAX_ACTIVE=${MAX_ACTIVE:-4}
      # Builds older than this are deleted along with their installers.
      - RETENTION_DAYS=${RETENTION_DAYS:-7}
      - PORT=3000
      - DATA_DIR=/data

    # Coolify's proxy (Traefik) routes to the container port; no host binding.
    expose:
      - "3000"

    # LOCAL USE ONLY — uncomment to reach it at http://localhost:3000.
    # Keep commented on Coolify so traffic goes through the proxy rather than
    # binding the port on the host and bypassing it.
    # ports:
    #   - "3000:3000"

    # One volume for the whole data dir: it holds jobs.db (build history) as
    # well as builds/ (the mirrored installers). Mounting only builds/ would
    # leave the database on the container layer and lose history on redeploy.
    volumes:
      - pake-data:/data

    # node:22-slim ships no curl or wget, so probe with Node's built-in fetch.
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "fetch('http://127.0.0.1:3000/api/health').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

    restart: unless-stopped

volumes:
  pake-data:
